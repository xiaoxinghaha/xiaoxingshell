name: Release

# Build native binaries for Windows / Linux / macOS.
#  - Push a tag like `v0.2.3`  -> builds all platforms and attaches the archives
#    to a GitHub Release.
#  - Run manually (workflow_dispatch) -> builds all platforms and uploads them as
#    downloadable workflow artifacts (no release created).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create / update the GitHub Release

env:
  APP_NAME: xiaoxingshell
  APP_DESKTOP_FILE: assets/xiaoxingshell.desktop
  APP_ICON_PNG: assets/icon.png
  APP_ICON_ICO: assets/xiaoxingshell.ico
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            bin: xiaoxingshell.exe
          - os: ubuntu-22.04            # build on the oldest supported runner for
            target: x86_64-unknown-linux-gnu   # broader glibc compatibility
            name: linux-x86_64
            bin: xiaoxingshell
          - os: ubuntu-22.04-arm       # free native arm64 runner (public repos)
            target: aarch64-unknown-linux-gnu  # builds the Linux ARM64 .tar.gz (#82)
            name: linux-aarch64
            bin: xiaoxingshell
          - os: macos-14               # Apple Silicon
            target: aarch64-apple-darwin
            name: macos-aarch64
            bin: xiaoxingshell
          - os: macos-14               # Apple Silicon runner — cross-compiles the
            target: x86_64-apple-darwin # x86_64 Mac binary. (Dedicated Intel
            name: macos-x86_64          # macos-13 runners queue for ages / time out.)
            bin: xiaoxingshell

    steps:
      - uses: actions/checkout@v5

      # Slint (winit + femtovg) + rfd (GTK) + arboard need these system libs.
      # Build-time only — no GPU/display required to compile.
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake \
            libfontconfig1-dev libfreetype6-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgtk-3-dev \
            libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Follow the current stable channel in CI. This avoids pinning the
          # workflow to a not-yet-available exact release while Cargo.toml still
          # enforces the crate's minimum supported rust-version.
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Show Rust versions
        run: |
          rustc --version
          cargo --version

      - name: Verify manifest and lockfile
        run: cargo metadata --locked --format-version 1 --no-deps

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --locked --release --target ${{ matrix.target }} --bin ${{ env.APP_NAME }} --verbose

      - name: Verify built binary exists
        shell: bash
        run: |
          set -eu
          test -f "target/${{ matrix.target }}/release/${{ matrix.bin }}"

      - name: Build AppImage
        if: matrix.name == 'linux-x86_64'
        continue-on-error: true           # don't block the .tar.gz if AppImage fails
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"   # no FUSE needed in CI
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME:-dev}"
          wget -q -O linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-appimage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-appimage

          install -Dm755 "target/${{ matrix.target }}/release/${{ matrix.bin }}" "AppDir/usr/bin/${APP_NAME}"
          install -Dm644 "${APP_DESKTOP_FILE}" "AppDir/usr/share/applications/${APP_NAME}.desktop"
          install -Dm644 "${APP_ICON_PNG}" "AppDir/usr/share/icons/hicolor/512x512/apps/${APP_NAME}.png"

          # --output appimage already invokes the plugin; --plugin appimage is redundant and causes an error
          ./linuxdeploy --appdir AppDir --output appimage

          mv "${APP_NAME}"*.AppImage "${APP_NAME}-${VERSION}-linux-x86_64.AppImage"
          echo "APPIMAGE=${APP_NAME}-${VERSION}-linux-x86_64.AppImage" >> "$GITHUB_ENV"

      - name: Package
        shell: bash
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME:-dev}"
          STAGE="${APP_NAME}-${VERSION}-${{ matrix.name }}"

          if [ "${{ runner.os }}" = "macOS" ]; then
            # ── Build a proper .app bundle ────────────────────────────────────
            # Without a bundle macOS opens raw binaries in Terminal.app, which
            # stays alive after the app exits and never shows a Dock icon.
            APP="${APP_NAME}.app"
            CONTENTS="$APP/Contents"
            mkdir -p "$CONTENTS/MacOS" "$CONTENTS/Resources"

            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$CONTENTS/MacOS/${APP_NAME}"

            # Re-encode the source icon to a clean PNG first. This avoids sips
            # format confusion when the repo icon asset was regenerated or
            # replaced on Windows and still has stale metadata.
            APP_ICON_CANONICAL="${RUNNER_TEMP}/${APP_NAME}-icon.png"
            sips -s format png "${APP_ICON_PNG}" --out "${APP_ICON_CANONICAL}" >/dev/null

            # Generate .icns from the canonical PNG using sips + iconutil (both
            # ship with every macOS, no extra tooling needed in CI).
            mkdir -p "${APP_NAME}.iconset"
            sips -z 16  16  "${APP_ICON_CANONICAL}" --out "${APP_NAME}.iconset/icon_16x16.png"       >/dev/null
            sips -z 32  32  "${APP_ICON_CANONICAL}" --out "${APP_NAME}.iconset/icon_16x16@2x.png"    >/dev/null
            sips -z 32  32  "${APP_ICON_CANONICAL}" --out "${APP_NAME}.iconset/icon_32x32.png"        >/dev/null
            sips -z 64  64  "${APP_ICON_CANONICAL}" --out "${APP_NAME}.iconset/icon_32x32@2x.png"    >/dev/null
            sips -z 128 128 "${APP_ICON_CANONICAL}" --out "${APP_NAME}.iconset/icon_128x128.png"     >/dev/null
            sips -z 256 256 "${APP_ICON_CANONICAL}" --out "${APP_NAME}.iconset/icon_128x128@2x.png"  >/dev/null
            sips -z 256 256 "${APP_ICON_CANONICAL}" --out "${APP_NAME}.iconset/icon_256x256.png"     >/dev/null
            sips -z 512 512 "${APP_ICON_CANONICAL}" --out "${APP_NAME}.iconset/icon_256x256@2x.png"  >/dev/null
            sips -z 512 512 "${APP_ICON_CANONICAL}" --out "${APP_NAME}.iconset/icon_512x512.png"     >/dev/null
            iconutil -c icns "${APP_NAME}.iconset" -o "$CONTENTS/Resources/${APP_NAME}.icns"

            # Substitute __VERSION__ placeholder (strip leading 'v' from tag)
            VERSION_NUM="${VERSION#v}"
            sed "s/__VERSION__/${VERSION_NUM}/g" assets/Info.plist > "$CONTENTS/Info.plist"

            # Ad-hoc code-sign the assembled bundle.
            # The release profile strips the binary (Cargo.toml: strip = "symbols"),
            # which invalidates the linker's automatic ad-hoc signature — on Apple
            # Silicon that makes the OS refuse to launch it ("app is damaged").
            # Re-signing the whole bundle here restores a valid (ad-hoc) signature,
            # turning the fatal "damaged" error into the normal "unidentified
            # developer" prompt that users can bypass via Open Anyway / xattr.
            codesign --force --deep --sign - "$APP"
            codesign --verify --verbose "$APP"

            # Package with ditto (Apple's tool) — it preserves the bundle's
            # signature and metadata. Plain `zip` mangles them and re-breaks the
            # signature, which would reintroduce the "damaged" error.
            ditto -c -k --keepParent "$APP" "${STAGE}.zip"
            echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

          elif [ "${{ runner.os }}" = "Windows" ]; then
            mkdir "$STAGE"
            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGE/"
            cp README.md README.en.md CHANGELOG.md "$STAGE/" 2>/dev/null || true
            7z a "${STAGE}.zip" "$STAGE" >/dev/null
            echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

          else
            # Linux
            mkdir "$STAGE"
            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGE/"
            cp README.md README.en.md CHANGELOG.md "$STAGE/" 2>/dev/null || true
            # Ship the desktop entry + installer + icon so the dock shows the icon.
            cp assets/install-linux.sh "$STAGE/" 2>/dev/null || true
            cp "${APP_DESKTOP_FILE}" "$STAGE/${APP_NAME}.desktop" 2>/dev/null || true
            cp "${APP_ICON_PNG}" "$STAGE/${APP_NAME}.png" 2>/dev/null || true
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"
          fi

      # MSI installer with a "choose install location" wizard (WixUI_InstallDir).
      # Best-effort: if the WiX/cargo-wix tooling hiccups it must not block the
      # .zip release, hence continue-on-error.
      - name: Build MSI installer (Windows)
        if: matrix.name == 'windows-x86_64'
        continue-on-error: true
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME"; if (-not $VERSION) { $VERSION = "dev" }
          # WiX 3 toolset (candle/light) that cargo-wix drives.
          choco install wixtoolset -y --no-progress
          $candle = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin\candle.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($candle) { $env:PATH = "$($candle.DirectoryName);$env:PATH" }
          cargo install cargo-wix --locked
          cargo wix --no-build --nocapture --target ${{ matrix.target }} --output "$env:APP_NAME-$VERSION-windows-x86_64.msi"
          echo "MSI=$env:APP_NAME-$VERSION-windows-x86_64.msi" >> $env:GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

      - name: Upload AppImage artifact
        if: matrix.name == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-appimage
          path: ${{ env.APPIMAGE }}

      - name: Upload MSI artifact
        if: matrix.name == 'windows-x86_64' && env.MSI != ''
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-msi
          path: ${{ env.MSI }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

      - name: Attach AppImage to GitHub Release
        if: matrix.name == 'linux-x86_64' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APPIMAGE }}
          fail_on_unmatched_files: true

      - name: Attach MSI to GitHub Release
        if: matrix.name == 'windows-x86_64' && env.MSI != '' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.MSI }}
          fail_on_unmatched_files: false
